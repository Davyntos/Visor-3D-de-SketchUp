<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visor 3D VR - Aulay8</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex flex-column min-vh-100 bg-dark text-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">
        <div class="container-fluid">
            <a class="navbar-brand fw-bold" href="#">Visualizador 3D interactivo</a>
            <span class="navbar-text text-muted d-none d-sm-inline">Prototipo VR listo</span>
        </div>
    </nav>

    <main class="flex-grow-1 position-relative" id="canvas-container">
        <div id="loading" class="position-absolute top-50 start-50 translate-middle text-center" style="z-index: 10;">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Cargando modelo aula_y8.glb...</p>
        </div>

        <div class="position-absolute bottom-0 start-0 m-3 d-flex flex-column align-items-center" style="z-index: 5; gap: 5px;">
            <button id="btn-forward" class="btn btn-primary opacity-75 fw-bold px-3 py-2">▲</button>
            <div class="d-flex" style="gap: 5px;">
                <button id="btn-left" class="btn btn-primary opacity-75 fw-bold px-3 py-2">◀</button>
                <div style="width: 45px;"></div> <button id="btn-right" class="btn btn-primary opacity-75 fw-bold px-3 py-2">▶</button>
            </div>
            <button id="btn-backward" class="btn btn-primary opacity-75 fw-bold px-3 py-2">▼</button>
        </div>

        <div class="position-absolute bottom-0 end-0 m-3 d-flex" style="z-index: 5; gap: 10px;">
            <button id="btn-rot-left" class="btn btn-secondary opacity-75 fw-bold px-3 py-2">🔄 Girar Izq</button>
            <button id="btn-rot-right" class="btn btn-secondary opacity-75 fw-bold px-3 py-2">Girar Der 🔄</button>
        </div>
    </main>

    <footer class="bg-black text-center py-3 border-top border-secondary mt-auto">
        <div class="container">
            <p class="mb-0 text-muted">
                Desarrollado por: <span class="text-light fw-bold">DAVID FIDEL GUZMÁN SÁNCHEZ</span> | Especialista Frontend & 3D
            </p>
            <small class="text-secondary">&copy; 2026 - Todos los derechos reservados.</small>
        </div>
    </footer>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script type="module" src="js/app.js"></script>
</body>
</html>
